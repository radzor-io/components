name: CI Validate Components

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout components
      uses: actions/checkout@v4
      with:
        path: components

    - name: Checkout spec
      uses: actions/checkout@v4
      with:
        repository: radzor-io/spec # Assuming the org is radzor-io
        path: spec

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      working-directory: ./components
      run: npm install

    - name: Run validation tests
      working-directory: ./components
      run: npx vitest run
