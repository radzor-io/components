name: Validate Manifests

on:
  push:
    paths:
      - "**/radzor.manifest.json"
      - "spec/**"
      - "scripts/**"
      - ".github/workflows/validate-manifests.yml"
  pull_request:
    paths:
      - "**/radzor.manifest.json"
      - "spec/**"
      - "scripts/**"
      - ".github/workflows/validate-manifests.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Download RCS schema
        run: |
          mkdir -p spec
          curl -fsSL \
            https://raw.githubusercontent.com/playmobitch/radzor/main/spec/radzor-manifest.schema.json \
            -o spec/radzor-manifest.schema.json

      - name: Validate all manifests
        run: node scripts/validate-manifests.js
